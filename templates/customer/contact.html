{% extends "base.html" %}
{% block content %}
<section class="section-heading">
  <div>
    <p class="eyebrow">Contact</p>
    <h1>{{ shop.name }}</h1>
  </div>
</section>

<section class="contact-grid">
  <a href="https://wa.me/{{ shop.phone.replace(' ', '').replace('+', '') }}" target="_blank" class="contact-card">
    <div class="contact-icon">📱</div>
    <span>Phone / WhatsApp</span>
    <strong>{{ shop.phone }}</strong>
  </a>
  <a href="https://mail.google.com/mail/?view=cm&fs=1&to={{ shop.email }}&subject=Contact%20from%20Crackers%20Hub" target="_blank" class="contact-card">
    <div class="contact-icon">✉️</div>
    <span>Email</span>
    <strong>{{ shop.email }}</strong>
  </a>
  <a href="https://www.google.com/maps/search/{{ shop.address.replace(' ', '+') }}" target="_blank" class="contact-card">
    <div class="contact-icon">📍</div>
    <span>Address</span>
    <strong>{{ shop.address }}</strong>
  </a>
</section>
{% endblock %}
