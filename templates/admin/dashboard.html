{% extends "base.html" %}
{% block content %}
<section class="section-heading">
  <div>
    <p class="eyebrow">Admin Panel</p>
    <h1>Dashboard</h1>
  </div>
  <a class="button secondary" href="{{ url_for('admin_logout') }}">Logout</a>
</section>

<section class="stats-grid">
  <a href="{{ url_for('admin_products') }}"><span>Active Products</span><strong>{{ product_count }}</strong></a>
  <a href="{{ url_for('admin_orders') }}"><span>Total Orders</span><strong>{{ order_count }}</strong></a>
  <a href="{{ url_for('admin_sales_details') }}" style="text-decoration:none;">
    <div><span>Total Sales</span><strong>Rs. {{ sales_total }}</strong></div>
  </a>

</section>
{% endblock %}
